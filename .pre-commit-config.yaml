# Install
# 1. pip install metagpt[dev]
# 2. pre-commit install
# 3. pre-commit run --all-files  # make sure all files are clean
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [ --fix, --extend-ignore=SIM ]
        exclude: "\\.json$"
      - id: ruff-format